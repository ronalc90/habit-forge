# ============================================
# HabitForge - Docker Compose (Stack completo)
# Autor: Ronald
# ============================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: habitforge-app
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: habitforge
      DB_PASSWORD: ${DB_PASSWORD:-habitforge_secret}
      DB_DATABASE: habitforge
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRATION: 7d
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - habitforge-network
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3002/api/v1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: habitforge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: habitforge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-habitforge_secret}
      POSTGRES_DB: habitforge
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - habitforge-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U habitforge']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: habitforge-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - habitforge-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: habitforge-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - habitforge-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: habitforge-grafana
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - habitforge-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  habitforge-network:
    driver: bridge
