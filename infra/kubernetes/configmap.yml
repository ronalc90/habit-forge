apiVersion: v1
kind: ConfigMap
metadata:
  name: habitforge-config
  namespace: habitforge
  labels:
    app: habitforge
data:
  NODE_ENV: "production"
  PORT: "3002"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_DATABASE: "habitforge"
  DB_USERNAME: "habitforge"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  JWT_EXPIRATION: "7d"
