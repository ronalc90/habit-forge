apiVersion: apps/v1
kind: Deployment
metadata:
  name: habitforge-api
  namespace: habitforge
  labels:
    app: habitforge
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: habitforge
      component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: habitforge
        component: api
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: habitforge-api
          image: ghcr.io/ronalc90/habit-forge:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
              protocol: TCP
              name: http
          envFrom:
            - configMapRef:
                name: habitforge-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: habitforge-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: habitforge-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      terminationGracePeriodSeconds: 30
