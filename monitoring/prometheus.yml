# ============================================
# HabitForge - Configuracion de Prometheus
# Autor: Ronald
# ============================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Metricas de la aplicacion NestJS
  - job_name: 'habitforge-api'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['app:3002']
        labels:
          app: 'habitforge'
          environment: 'production'
    scrape_interval: 10s

  # Health check endpoint
  - job_name: 'habitforge-health'
    metrics_path: '/api/v1'
    static_configs:
      - targets: ['app:3002']
        labels:
          app: 'habitforge'
          type: 'health'
    scrape_interval: 30s

  # Prometheus se monitorea a si mismo
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (metricas del host)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # cAdvisor (metricas de contenedores Docker)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s

  # PostgreSQL (si se agrega pg_exporter)
